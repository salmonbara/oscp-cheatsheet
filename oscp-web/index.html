<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSCP Command Suggest</title>
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("oscp-theme");
          const preferredTheme =
            savedTheme ||
            (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.dataset.theme = preferredTheme;
        } catch {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="stylesheet" href="./assets/styles.css?v=20260429-checklists" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p id="heroEyebrow" class="eyebrow">OSCP Cheatsheet</p>
          <h1 id="heroTitle">Command Suggestions</h1>
          <p id="heroLede" class="lede">
            Choose what you have, the target, and the service. This page will surface the most relevant commands from your
            notes.
          </p>
        </div>
        <aside class="status-card" aria-live="polite">
          <span id="statusCount">0</span>
          <small id="statusLabel">Ready commands</small>
          <div class="meter"><span id="readyMeter"></span></div>
          <p id="dataStamp">Loading data...</p>
        </aside>
      </header>

      <nav id="viewSwitch" class="view-switch" aria-label="View mode"></nav>

      <section class="toolbar" aria-label="Search and actions">
        <label class="search-box">
          <span id="searchLabel">Search</span>
        <input id="searchInput" type="search" placeholder="command / note / subsection" autocomplete="off" />
        </label>
        <button id="readyOnlyButton" class="ghost-button" type="button" aria-pressed="false">Ready Only</button>
        <button id="resetChecklistButton" class="ghost-button hidden" type="button">Reset Checklists</button>
        <button id="themeToggleButton" class="ghost-button" type="button">Dark Mode</button>
        <button id="resetButton" class="ghost-button" type="button">Reset</button>
      </section>

      <nav id="tabs" class="tabs" aria-label="Command tabs"></nav>

      <main class="layout">
        <aside class="filters">
          <section id="selectionPanel" class="selection-panel">
            <h2>Selected</h2>
            <div id="selectedQuery" class="selected-query">Pick tags to begin</div>
          </section>
          <section id="noteIndexPanel" class="selection-panel hidden">
            <h2>Notes</h2>
            <div id="noteIndex" class="note-links"></div>
          </section>
          <div id="tagGroups" class="tag-groups"></div>
        </aside>

        <section class="results-panel">
          <div class="results-head">
            <div>
              <p id="resultEyebrow" class="eyebrow">Suggestions</p>
              <h2 id="resultTitle">All commands</h2>
            </div>
            <p id="resultCount" class="result-count">0 results</p>
          </div>
          <div id="results" class="results" aria-live="polite"></div>
        </section>

        <aside id="noteTocPanel" class="note-toc-panel hidden">
          <section class="selection-panel">
            <h2 id="noteTocHeading">Contents</h2>
            <div id="noteToc" class="note-toc"></div>
          </section>
        </aside>
      </main>
    </div>

    <template id="commandTemplate">
      <article class="command-card">
        <div class="card-top">
          <div>
            <p class="source"></p>
            <h3></h3>
            <p class="command-description"></p>
          </div>
          <div class="state-pill"></div>
        </div>
        <div class="code-panel command-code-panel">
          <div class="code-head">
            <span class="code-kind-badge"></span>
            <button class="code-copy-button" type="button">copy</button>
          </div>
          <pre><code></code></pre>
        </div>
        <div class="card-footer">
          <div class="badges"></div>
          <p class="outputs"></p>
        </div>
      </article>
    </template>

    <template id="noteTemplate">
      <article class="note-card">
        <div class="card-top">
          <div>
            <p class="source"></p>
            <h3></h3>
          </div>
        </div>
        <div class="note-content"></div>
      </article>
    </template>

    <button id="backToTopButton" class="back-to-top" type="button" aria-label="Back to top" title="Back to top">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 5 5 12l1.4 1.4L11 8.8V20h2V8.8l4.6 4.6L19 12z" />
      </svg>
    </button>

    <script type="module" src="./assets/app.js?v=20260429-checklists"></script>
  </body>
</html>
